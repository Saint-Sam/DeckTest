name: recurring-checks-disabled-local-only

on:
  schedule:
    - cron: "17 5 * * *"
    - cron: "43 6 * * 1"
  workflow_dispatch:
    inputs:
      suite:
        description: "Recurring suite to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - nightly
          - weekly

permissions:
  contents: read

concurrency:
  group: recurring-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  full-oracle-corpus:
    name: nightly-oracle-corpus
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '17 5 * * *'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        if: ${{ hashFiles('Cargo.toml') != '' }}
      - name: Run full oracle corpus
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.suite }}" = "weekly" ]; then
            echo "Skipping nightly oracle corpus for weekly-only dispatch."
            exit 0
          fi
          if [ -x scripts/run_oracle.sh ]; then
            scripts/run_oracle.sh --all
          elif [ -e scripts/run_oracle.sh ]; then
            echo "::error::scripts/run_oracle.sh exists but is not executable."
            exit 1
          else
            echo "scripts/run_oracle.sh is not present/executable yet; T0.4 owns this hook."
          fi

  fuzz-nightly:
    name: nightly-fuzz
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '17 5 * * *'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install nightly Rust
        run: rustup toolchain install nightly --profile minimal
      - uses: Swatinem/rust-cache@v2
        if: ${{ hashFiles('Cargo.toml') != '' }}
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz targets
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.suite }}" = "weekly" ]; then
            echo "Skipping nightly fuzz for weekly-only dispatch."
            exit 0
          fi
          if [ -x scripts/fuzz_nightly.sh ]; then
            scripts/fuzz_nightly.sh
          elif [ -e scripts/fuzz_nightly.sh ]; then
            echo "::error::scripts/fuzz_nightly.sh exists but is not executable."
            exit 1
          else
            echo "scripts/fuzz_nightly.sh is not present/executable yet; T0.4 owns this hook."
          fi

  perf-suite:
    name: nightly-perf-suite
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '17 5 * * *'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        if: ${{ hashFiles('Cargo.toml') != '' }}
      - name: Run perf suite
        env:
          FORGE_PERF_BASELINE: metrics/perf_baseline.ci-ubuntu.json
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.suite }}" = "weekly" ]; then
            echo "Skipping nightly perf for weekly-only dispatch."
            exit 0
          fi
          if [ ! -f Cargo.toml ]; then
            echo "Cargo.toml is not present yet; skipping until T0.2 lands."
            exit 0
          fi
          if [ -x scripts/perf_smoke.sh ]; then
            scripts/perf_smoke.sh
          elif [ -e scripts/perf_smoke.sh ]; then
            echo "::error::scripts/perf_smoke.sh exists but is not executable."
            exit 1
          else
            echo "scripts/perf_smoke.sh is not present/executable yet; T0.4 owns this hook."
          fi

  card-corpus:
    name: nightly-card-corpus
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '17 5 * * *'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        if: ${{ hashFiles('Cargo.toml') != '' }}
      - name: Run card regression smoke
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.suite }}" = "weekly" ]; then
            echo "Skipping nightly card corpus for weekly-only dispatch."
            exit 0
          fi
          if [ -x scripts/card_regression.sh ]; then
            scripts/card_regression.sh
          elif [ -e scripts/card_regression.sh ]; then
            echo "::error::scripts/card_regression.sh exists but is not executable."
            exit 1
          else
            echo "scripts/card_regression.sh is not present/executable yet; T0.4 owns this hook."
          fi

  arena-ladder:
    name: weekly-arena-ladder
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '43 6 * * 1'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        if: ${{ hashFiles('Cargo.toml') != '' }}
      - name: Run arena ladder
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.suite }}" = "nightly" ]; then
            echo "Skipping weekly arena ladder for nightly-only dispatch."
            exit 0
          fi
          if [ ! -f Cargo.toml ]; then
            echo "Cargo.toml is not present yet; skipping until T0.2 lands."
            exit 0
          fi
          cargo run -p forge-arena -- --ladder --games 2000

  dependency-audit:
    name: weekly-dependency-audit
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '43 6 * * 1'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        if: ${{ hashFiles('Cargo.toml') != '' }}
      - name: Run dependency audit
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.suite }}" = "nightly" ]; then
            echo "Skipping weekly dependency audit for nightly-only dispatch."
            exit 0
          fi
          if [ ! -f Cargo.toml ]; then
            echo "Cargo.toml is not present yet; skipping until T0.2 lands."
            exit 0
          fi
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
          cargo audit
          cargo deny check
