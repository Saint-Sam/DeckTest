id: T1.6
title: Combat kernel with declarations and keyword-simple damage
tier: 1
tags:
  - kernel
  - combat
  - deterministic-state
  - keywords
scope_paths:
  - crates/forge-core/src/lib.rs
inputs:
  - FORGE_REBUILD_MASTER_PLAN.md Section 6 T1.6
  - docs/vendor/comprehensive-rules.txt rules 506-511
  - docs/vendor/comprehensive-rules.txt rules 702.2, 702.4, 702.7, 702.9, 702.15, 702.17, 702.19, and 702.20
acceptance:
  - combat state tracks attackers, blockers, blocked status, damage records, and first-strike combat damage round metadata
  - object state tracks tapped status, creature power/toughness, keyword-simple abilities, marked damage, and control timing
  - declare_attackers validates active player, step, controller, battlefield creature status, tapped status, summoning sickness, and defending player
  - attackers tap unless they have vigilance
  - declare_blockers validates defending player, blocker legality, flying/reach, and menace
  - blocked attackers remain blocked even after blockers leave combat
  - combat damage supports normal, first-strike, and regular-after-first-strike rounds
  - combat damage validates legal source/target assignments and requires all damage-capable combatants to assign damage
  - trample assignment accounts for deathtouch lethal damage
  - lifelink applies as damage is dealt
  - creature damage is marked now and cleared during cleanup; lethal/deathtouch destruction is deferred to T1.7 SBAs
  - combat state and object combat fields affect canonical bytes and streaming state hashes
verify: cargo test -p forge-core && cargo clippy -p forge-core --all-targets -- -D warnings && scripts/vl.sh
retry_policy: 3 attempts then blocker
depends_on:
  - T1.5
parallel_ok: false
