id: T1.2
title: CR 5 turn structure, phases, steps, and cleanup timing
tier: 1
tags:
  - kernel
  - turn-structure
  - deterministic-state
scope_paths:
  - crates/forge-core/src/lib.rs
inputs:
  - FORGE_REBUILD_MASTER_PLAN.md Section 6 T1.2
  - docs/vendor/comprehensive-rules.txt rules 500-514
acceptance:
  - forge-core exposes explicit Phase and Step machine states for CR 500-514
  - GameState can start and advance turns deterministically
  - untap has no priority and normal priority windows assign active-player priority
  - draw step performs its turn-based draw before assigning priority
  - combat can skip declare blockers and combat damage when no attackers exist
  - cleanup discards to maximum hand size before next turn advancement
  - UntilEndOfTurn and ThisTurn duration markers survive the end step and expire during cleanup
  - cleanup can repeat through a CR 514.3a priority exception hook
verify: cargo test -p forge-core && cargo clippy -p forge-core --all-targets -- -D warnings
retry_policy: 3 attempts then blocker
depends_on:
  - T1.1
parallel_ok: false
