id: T1.R9
title: Obtain exact final-tree remote CI
tier: 1
priority: P0
tags:
  - remediation
  - t1-gate
  - ci
  - evidence
scope_paths:
  - reports/gates/T1/
  - reports/status/
inputs:
  - reports/gates/T1/SIGNOFF.md
acceptance:
